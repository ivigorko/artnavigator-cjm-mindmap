<!DOCTYPE html>

<title>АртНавигатор — Mind Map педагога</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f5fa; }
.wrap { overflow: auto; max-width: 100%; }
svg { display: block; min-width: 100%; }
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,15,30,0.5); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
.modal.active { display: flex; }
.modal-content { background: #fff; border-radius: 12px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding: 20px 28px; border-bottom: 2px solid #4834d4; display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { margin: 0; font-size: 18px; color: #1a1f3a; }
.modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #6c7393; line-height: 1; padding: 0; width: 32px; height: 32px; }
.modal-close:hover { color: #1a1f3a; }
.modal-body { padding: 20px 28px; }
.step-num { display: inline-block; font-size: 11px; font-weight: 700; color: #6c5ce7; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.field { margin-bottom: 18px; }
.field-label { font-size: 10px; font-weight: 700; color: #6c5ce7; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 5px; }
.field-value { font-size: 13px; line-height: 1.55; color: #2d3142; white-space: pre-wrap; }
.emotion-badge { display: inline-block; background: #6c5ce7; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
.pain-item { background: #fff5f3; border-left: 3px solid #ff7675; padding: 10px 14px; border-radius: 0 6px 6px 0; margin-bottom: 6px; font-size: 13px; }
.pain-item::before { content: '!'; color: #ff7675; font-weight: 700; margin-right: 8px; }
.opp-item { background: #f0fff4; border-left: 3px solid #00b894; padding: 10px 14px; border-radius: 0 6px 6px 0; margin-bottom: 6px; font-size: 13px; }
.opp-item::before { content: '+'; color: #00b894; font-weight: 700; margin-right: 8px; }
.thought-item { padding: 4px 0; font-size: 13px; line-height: 1.5; }
.thought-item::before { content: '"'; color: #6c5ce7; font-weight: 700; margin-right: 2px; }
.thought-item::after { content: '"'; color: #6c5ce7; font-weight: 700; margin-left: 2px; }
.hint { position: fixed; bottom: 20px; right: 20px; background: #4834d4; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; box-shadow: 0 4px 16px rgba(72,52,212,0.3); }
</style>
</head>

нтекст":"Елена открывает Яндекс, вбивает запросы, советуется с коллегами, просматривает каталог events.артнавигатор.рф."}},{"id":"A2.1","title":"Поиск через Яндекс и обход сайтов","fields":{"Touchpoint":"Яндекс.Поиск - \"детские конкурсы хоровых коллективов 2026 диплом гос. образца\", потом сторонние сайты организаторов\r\n- **Goal:** найти 3-7 вариантов для сравнения\r\n- **Thoughts:**\r\n  - \"Ой, опять 30 вкладок открыто\"\r\n  - \"Этот сайт требует регистрации перед тем, как я увижу положение\"\r\n  - \"Яндекс выдает какие-то странные сайты 2015 года - им можно доверять?\"\r\n- **Emotion:** frustrated (2)\r\n- **Intensity:** 2\r\n- **Pain points:**\r\n  - \"70% отвал на этапе визит - просмотр карточки конкурса\" (CONTEXT.md, \"Топ-пробои\")\r\n  - \"Карточка конкурса не даёт ключевых ответов сразу: статус, цену, сроки, формат участия\" (CONTEXT.md, раздел воронки \"карточка - 80% отвал\")\r\n- **Opportunities:**\r\n  - SEO-оптимизация страниц конкурсов по длинным хвостам \"конкурс для [название коллектива] диплом гос. образца\"\r\n  - Сниппет в выдаче с 4 главными параметрами: цена, дата, формат, статус диплома"}},{"id":"A2.2","title":"Сравнение вариантов в агрегаторе ArtNavigator","fields":{"Touchpoint":"events.артнавигатор.рф - фильтры по типу коллектива, региону, статусу диплома\r\n- **Goal:** выбрать 2-3 финалиста, которых покажет заведующей\r\n- **Thoughts:**\r\n  - \"Здесь хотя бы всё в одном месте, не надо 30 вкладок держать\"\r\n  - \"Фильтр по гос. образцу есть, но не очень понятно, что они имеют в виду\"\r\n  - \"Ага, есть отзывы от других педагогов - уже хорошо\"\r\n- **Emotion:** hopeful (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Нет внятного отличия 'гос. образца' от обычного - выглядит одинаково в фильтрах\" (гипотеза)\r\n  - \"Отзывов мало, в основном от родителей-одиночек\" (гипотеза)\r\n- **Opportunities:**\r\n  - На карточке конкурса - явный бейдж \"Диплом гос. образца\" или \"Сертификат АНО/НКО\"\r\n  - Блок \"Подходит для: школь ссылка)","Контекст":"заявка подана, нужно оплатить - либо из бюджета учреждения, либо собрав деньги с родителей."}},{"id":"A4.1","title":"Сбор денег с родителей","fields":{"Touchpoint":"MAX-чат родителей / сообщение в родительский чат в школе / объявление на собрании\r\n- **Goal:** собрать 20-40 переводов по 200-500 рублей за 3-5 дней\r\n- **Thoughts:**\r\n  - \"Опять половина забудет, потом догоняй неделю\"\r\n  - \"Переводы на карту - это 30 уведомлений от Сбера, потом сверяй\"\r\n  - \"Пятеро платят наличкой - придётся идти в банк\"\r\n- **Emotion:** anxious (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Сверять 30 переводов с номерами родителей - ад\" (гипотеза)\r\n  - \"Нет прозрачного статуса - кто заплатил, кто нет\" (гипотеза)\r\n- **Opportunities:**\r\n  - Генерация персональных ссылок на оплату для каждого родителя (Т-Касса поддерживает)\r\n  - Сводная таблица \"Заявка - сбор средств\" в ЛК: \"Оплачено 24/32\""}},{"id":"A4.2","title":"Оплата на платформе","fields":{"Touchpoint":"форма оплаты Т-Кассы на events.артнавигатор.рф\r\n- **Goal:** завершить транзакцию и получить подтверждение\r\n- **Thoughts:**\r\n  - \"Сейчас карта отклонится и всё заново...\"\r\n  - \"Квитанцию надо сохранить для бухгалтерии\"\r\n  - \"А платёж сразу пройдёт или будет висеть сутки?\"\r\n- **Emotion:** anxious (2)\r\n- **Intensity:** 2\r\n- **Pain points:**\r\n  - \"Нет email/SMS-подтверждения после оплаты\" (CONTEXT.md, \"Известные боли педагога\")\r\n  - \"Нет триггера на брошенную корзину\" (CONTEXT.md, раздел \"Топ-пробои\")\r\n  - \"Данные по конверсии форма - оплата отсутствуют\" (CONTEXT.md)\r\n- **Opportunities:**\r\n  - SMS и email сразу после оплаты: \"Заявка #A12456 оплачена, чек во вложении\"\r\n  - Напоминание в MAX-бот через 2 часа, если корзина брошена\r\n  - Ссылка на чеки в ЛК для бухгалтерии учреждения","Контекст":"деньги собраны, заявка оплачена, осталось подготовить номера и провести конкурс."}},{"id":"A5.1","title":"Репетиции и подготовка номеров"," ссии?\"\r\n- **Emotion:** proud (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"oki.артнавигатор.рф - 34.2% конверсия, лучшая в проекте, но педагоги туда не доходят\" (CONTEXT.md, аналитика)\r\n  - \"Нет единой папки с дипломами за все годы на одного педагога\" (CONTEXT.md, \"нет CRM\")\r\n  - \"Нет Excel-выгрузки дипломов по списку\" (CONTEXT.md, \"Известные боли\")\r\n- **Opportunities:**\r\n  - Автоматический сбор дипломов в \"Портфолио коллектива\" в ЛК на my.артнавигатор.рф\r\n  - Excel-выгрузка \"Список участников + достижения\" для отчёта директору"}},{"id":"A6.2","title":"Рассылка дипломов родителям","fields":{"Touchpoint":"MAX-чат с родителями + email\r\n- **Goal:** каждый родитель получил PDF диплома своего ребёнка\r\n- **Thoughts:**\r\n  - \"Опять отправлять 32 сообщения... а можно ссылку общую?\"\r\n  - \"Хорошо бы родители сами скачивали из своего ЛК\"\r\n- **Emotion:** confident (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"Каждый диплом отдельно - массовой рассылки нет\" (гипотеза)\r\n- **Opportunities:**\r\n  - Публичная страница \"Результаты хора [название] на конкурсе [название]\" с защитой по ссылке\r\n  - Возможность родителю получить диплом через my.артнавигатор.рф по своему ребёнку","Контекст":"конкурс позади, Елена оценивает опыт."}},{"id":"A7.1","title":"Отчёт директору и в портфолио учреждения","fields":{"Touchpoint":"бумажный отчёт директору + разговор на планёрке\r\n- **Goal:** показать результат в формате \"X детей, Y дипломов, Z лауреатов\"\r\n- **Thoughts:**\r\n  - \"Надо сесть и свести всё в табличку\"\r\n  - \"Ой, а где у меня статистика по номинациям?\"\r\n  - \"Хорошо бы просто нажать одну кнопку и получить готовый отчёт\"\r\n- **Emotion:** frustrated (2)\r\n- **Intensity:** 2\r\n- **Pain points:**\r\n  - \"Дипломы учеников разбросаны по папкам на рабочем столе\" (SEGMENT_MASSOVY.md, цитата сегмента)\r\n  - \"Нет агрегированной статистики по коллективу за год\" (гипотеза)\r\n- **Opportunities:**\r\n  - Кнопка \"Сформировать отчёт для администрации\" в ЛК - PDF с логотипом учреждения и сводкой"}},{"id":"A7.2","title":"Решение - идти на следующий конкурс или нет","fields":{"Touchpoint":"обсуждение с коллегами в учительской / внутренний диалог\r\n- **Goal:** понять, повторять ли опыт\r\n- **Thoughts:**\r\n  - \"В целом норм, но устала от бумаг\"\r\n  - \"Если бы не Excel-ад с заявками, повторила бы сразу\"\r\n  - \"Подожду до следующего сезона\"\r\n- **Emotion:** hopeful (2)\r\n- **Intensity:** 2\r\n- **Pain points:**\r\n  - \"Нет системы напоминаний 'вы давно не подавали заявку'\" (CONTEXT.md, раздел \"100% потерь повторных\")\r\n  - \"Нет follow-up, после конкурса платформа 'отпускает' педагога\" (CONTEXT.md, \"нет CRM\")\r\n- **Opportunities:**\r\n  - Email через 1-2 месяца: \"Следующие конкурсы для хоровых коллективов - 5 новых вариантов\"\r\n  - Кнопка \"Сохранить коллектив в избранное\" для быстрого повтора"}},{"id":"B1.1","title":"Согласование бюджета и целей с администрацией","fields":{"Touchpoint":"разговор с завучей / планёрка в начале сентября / заявка на внебюджетные средства\r\n- **Goal:** получить \"добро\" на 1-3 конкурса в год и согласовать источник финансирования\r\n- **Thoughts:**\r\n  - \"Опять надо объяснять завучу, зачем нам конкурсы, если дети и так поют\"\r\n  - \"Бюджет - ноль, значит опять с родителей\"\r\n  - \"Лимит 3 конкурса - больше администрация не пропустит\"\r\n- **Emotion:** anxious (2)\r\n- **Intensity:** 2\r\n- **Pain points:**\r\n  - \"Нет готовой аргументации 'почему конкурсы нужны для аттестации'\" (гипотеза)\r\n  - \"Цифры по конкурсам приходится собирать заново каждый сентябрь\" (гипотеза)\r\n- **Opportunities:**\r\n  - В ЛК блок \"Аргументы для администрации\" с шаблоном служебной записки\r\n  - PDF \"Результаты прошлого сезона\" для отчёта за прошлый год"}},{"id":"B1.2","title":"Утверждение списка мероприятий","fields":{"Touchpoint":"рабочий блокнот / Excel / календарь на телефоне\r\n- **Goal:** зафиксировать 1-3 конкурса и сроки подачи\r\n- **Thoughts:**\r\n  - \"Ок, муниципальный в ноябре, всероссийский в марте, школьный в мае\"\r\n  - \"Подавать надо за 2 месяца, значит в сентябре надо определиться по ноябрьскому\"\r\n- **Emotion:** confident (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Нет общего календаря конкурсов на год - собираю из разных источников\" (CONTEXT.md, \"сложный путь\")\r\n- **Opportunities:**\r\n  - На events.артнавигатор.рф - \"Календарь на учебный год\" с фильтром по типу коллектива","Контекст":"октябрь, Елена активно ищет конкурсы на первую половину года."}},{"id":"B2.1","title":"Просмотр каталога и подписка на новинки","fields":{"Touchpoint":"events.артнавигатор.рф + email-рассылка \"Новые конкурсы для хоров\"\r\n- **Goal:** найти 5-7 вариантов на ноябрь-февраль\r\n- **Thoughts:**\r\n  - \"Хорошо бы подписаться на рассылку по моему профилю\"\r\n  - \"Надоел Яндекс, дай мне нормальный агрегатор\"\r\n- **Emotion:** hopeful (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"70% отвал на этапе визит - карточка\" (CONTEXT.md, раздел воронки)\r\n  - \"Нет персональных рекомендаций - смотрю всё подряд\" (гипотеза)\r\n- **Opportunities:**\r\n  - Email-дайджест \"5 новых конкурсов для школьных хоров\" 1-2 раза в месяц\r\n  - MAX-канал \"Конкурсы для [тип коллектива]\" (нац. мессенджер, охват среди педагогов выше 60%)"}},{"id":"B2.2","title":"Консультация с коллегами и выбор","fields":{"Touchpoint":"MAX-чат с коллегами / звонок Петровне / обсуждение в учительской\r\n- **Goal:** выбрать 1 основной и 1 запасной конкурс на ноябрь\r\n- **Thoughts:**\r\n  - \"Петровна в прошлом году возила, говорит - норм, организаторы отзывчивые\"\r\n  - \"А тот, что в Яндексе выскочил, я бы не рискнула - отзывов мало\"\r\n- **Emotion:** confident (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Отзывы в основном от родителей, а не от педагогов\" (гипотеза)\r\n- **Opportunities:**\r\n  - Блок \"Педагоги рекомендуют\" на странице конкурса - отзывы от других руководителей","Контекст":"октябрь-февраль, Елена подаёт заявки на 1-й, 2-й, 3-й конкурсы по графику."}},{"id":"B3.1","title":"Подача первой заявки сезона (октябрь)","fields":{"Touchpoint":"events.артнавигатор.рф - форма заявки + ЛК my.артнавигатор.рф\r\n- **Goal:** оформить заявку, оплатить, подтвердить участие\r\n- **Thoughts:**\r\n  - \"О, в этом году я уже знаю, как работает форма\"\r\n  - \"Хорошо бы сохранить шаблон заявки, чтобы повторно заполнять\"\r\n- **Emotion:** confident (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Форма не сохраняет черновик надолго\" (гипотеза)\r\n  - \"Снова заполнять 600 полей на 30 детей\" (CONTEXT.md, \"Известные боли\")\r\n- **Opportunities:**\r\n  - \"Шаблон коллектива\" в ЛК - сохраняет список учеников для повторных заявок\r\n  - Кнопка \"Скопировать заявку с прошлого конкурса\""}},{"id":"B3.2","title":"Подача второй заявки (январь-февраль)","fields":{"Touchpoint":"events.артнавигатор.рф + ЛК my.артнавигатор.рф - история заявок\r\n- **Goal:** оформить новую заявку, используя прошлый опыт\r\n- **Thoughts:**\r\n  - \"Я помню тот конкурс, но не помню, как там номинации назывались\"\r\n  - \"Слава богу, в ЛК есть история - могу посмотреть\"\r\n- **Emotion:** confident (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"my.артнавигатор.рф - всего 464 визита в год, педагоги почти не заходят\" (CONTEXT.md, аналитика)\r\n  - \"ЛК неудобный - я туда попадаю раз в год и забываю, где что\" (гипотеза)\r\n- **Opportunities:**\r\n  - Дашборд \"Мои заявки\" в ЛК - сразу видны статусы, сроки оплаты, результаты\r\n  - Бейдж уведомлений \"2 активные заявки\"","Контекст":"весь учебный год, Елена параллельно ведёт несколько заявок в разных стадиях."}},{"id":"B4.1","title":"Сбор денег с родителей по графику","fields":{"Touchpoint":"MAX-чат + Т-Касса (если есть персональные ссылки)\r\n- **Goal:** собрать средства от 20-40 семей по 2-3 конкурсам в год\r\n- **Thoughts:**\r\n  - \"Один сбор закрыли, начинаем второй\"\r\n  - \"Половина уже отказались - 'опять деньги'\"\r\n- **Emotion:** frustrated (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Три сбора в год - это 90 сообщений в чат и 90 сверок\" (гипотеза)\r\n  - \"Часть родителей категорически против платных конкурсов\" (гипотеза)\r\n- **Opportunities:**\r\n  - Генератор персональных ссылок на оплату в ЛК с автоматической сверкой\r\n  - Возможность назначить \"родителя-координатора\" для сбора"}},{"id":"B4.2","title":"Контроль статусов заявок в ЛК","fields":{"Touchpoint":"my.артнавигатор.рф - дашборд \"Мои заявки\"\r\n- **Goal:** видеть, что оплачено, что ожидает, какие сроки горят\r\n- **Thoughts:**\r\n  - \"Так, эта заявка в статусе 'оплачено', эта 'ожидает подтверждения'\"\r\n  - \"Ах, через неделю дедлайн по загрузке работ, а я забыла\"\r\n- **Emotion:** confident (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Нет триггеров на ключевые дедлайны\" (CONTEXT.md, \"нет CRM\")\r\n  - \"В ЛК надо копаться, чтобы найти нужную заявку\" (CONTEXT.md, \"ЛК 464 визита\")\r\n- **Opportunities:**\r\n  - Push/SMS-напоминания за 3 дня до дедлайнов (загрузка работ, оплата, документы)\r\n  - Сводная страница \"Активные конкурсы\" с цветовой разметкой статусов","Контекст":"ноябрь-апрель, проводятся конкурсы, Елена получает дипломы и оформляет портфолио."}},{"id":"B5.1","title":"Участие в 2-3 конкурсах","fields":{"Touchpoint":"площадки конкурсов + ЛК ArtNavigator как центр уведомлений\r\n- **Goal:** организовать участие без авралов\r\n- **Thoughts:**\r\n  - \"Три конкурса в год - два по городу, один онлайн\"\r\n  - \"Главное - не накладки по срокам\"\r\n- **Emotion:** hopeful (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"Нет сводного расписания 'ваши мероприятия на этой неделе'\" (гипотеза)\r\n- **Opportunities:**\r\n  - Календарь \"Все мои конкурсы\" в ЛК с экспортом в Google Calendar\r\n  - Виджет на главной \"Ближайшее событие через 5 дней\""}},{"id":"B5.2","title":"Сбор дипломов в портфолио коллектива","fields":{"Touchpoint":"oki.артнавигатор.рф + my.артнавигатор.рф - портфолио коллектива\r\n- **Goal:** собрать все дипломы в одно место для отчёта\r\n- **Thoughts:**\r\n  - \"О, я могу постепенно добавлять сюда дипломы в течение года\"\r\n  - \"Ученики уходят - их достижения остаются\"\r\n- **Emotion:** proud (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"Дипломы получаю в разных форматах и папках\" (SEGMENT_MASSOVY.md)\r\n  - \"Нет выгрузки Excel для отчёта\" (CONTEXT.md, \"Известные боли\")\r\n- **Opportunities:**\r\n  - Автоимпорт дипломов из email организатора в ЛК\r\n  - \"Портфолио коллектива\" с тегами \"лауреат\", \"дипломант\", по годам и номинациям","Контекст":"конец учебного года, Елена готовит итоговый отчёт."}},{"id":"B6.1","title":"Сводный отчёт для администрации","fields":{"Touchpoint":"my.артнавигатор.рф - генератор отчёта\r\n- **Goal:** свести все достижения за год в один документ\r\n- **Thoughts:**\r\n  - \"Один PDF с логотипом школы, вставить в презентацию на педсовете\"\r\n  - \"У меня 32 ребёнка, 28 приняли участие, 25 с дипломами - цифры для отчёта\"\r\n- **Emotion:** proud (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"Отчёт собираю вручную из разных источников\" (CONTEXT.md, фрустрация сегмента)\r\n- **Opportunities:**\r\n  - Кнопка \"Сформировать годовой отчёт\" в ЛК с шаблоном \"Отчёт о достижениях коллектива за 2026-2027 уч. год\""}},{"id":"B6.2","title":"Подготовка публичной страницы коллектива","fields":{"Touchpoint":"classes.артнавигатор.рф + афиша на сайте школы\r\n- **Goal:** показать результаты родителям и привлечь новых учеников\r\n- **Thoughts:**\r\n  - \"Можно ссылку в чат родителям бросить - пусть смотрят\"\r\n- **Emotion:** proud (5)\r\n- **Intensity:** 5\r\n- **Pain points:**\r\n  - \"classes.артнавигатор.рф - 2,500+ школ, но я не знаю, как там завести страницу коллектива\" (гипотеза)\r\n- **Opportunities:**\r\n  - Готовый шаблон \"Страница коллектива\" на classes.артнавигатор.рф - педагог заполняет 10 полей, родители делятся ссылкой","Контекст":"каникулы, Елена думает о следующем сезоне."}},{"id":"B7.1","title":"Анализ прошлого сезона и планы","fields":{"Touchpoint":"my.артнавигатор.рф - аналитика сезона\r\n- **Goal:** понять, что повторить, что изменить\r\n- **Thoughts:**\r\n  - \"Какие конкурсы дали лучший результат?\"\r\n  - \"В каком формате родители активнее - онлайн или очно?\"\r\n- **Emotion:** hopeful (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Нет аналитики по прошлым сезонам - по памяти вспоминаю\" (гипотеза)\r\n- **Opportunities:**\r\n  - Дашборд \"Сравнение сезонов\" - графики участия, стоимости, результатов"}},{"id":"B7.2","title":"Формирование списка на следующий год","fields":{"Touchpoint":"events.артнавигатор.рф - \"Планировщик сезона\"\r\n- **Goal:** предварительно выбрать 3-5 конкурсов на следующий год\r\n- **Thoughts:**\r\n  - \"Хорошо бы заранее записаться в лист ожидания\"\r\n- **Emotion:** hopeful (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"В июне конкурсов на следующий год ещё нет - невозможно планировать\" (гипотеза)\r\n- **Opportunities:**\r\n  - \"Ранний список\" конкурсов с пометкой \"откроется в сентябре, подпишитесь на уведомление\""}},{"id":"C1.1","title":"Услышала про ArtNavigator","fields":{"Touchpoint":"коллега в учительской / пост в MAX-сообществе педагогов / выдача Яндекса\r\n- **Goal:** понять, что это вообще такое и зачем мне\r\n- **Thoughts:**\r\n  - \"Петровна говорит - попробуй, удобно\"\r\n  - \"А, это агрегатор конкурсов - у нас в городе такого не было\"\r\n  - \"Яндекс выдал, когда искала конкурс - посмотрю, что за сайт\"\r\n- **Emotion:** confused (1)\r\n- **Intensity:** 1\r\n- **Pain points:**\r\n  - \"Нет внятного позиционирования для педагога на главной\" (гипотеза)\r\n  - \"99.7% отвал на прямых визитах без понимания, куда попал\" (CONTEXT.md, \"Топ-пробои\")\r\n- **Opportunities:**\r\n  - Лендинг \"Для педагогов\" с 3 главными ответами и одной кнопкой \"Найти конкурс\"\r\n  - Сторис от реальных педагогов на главной (\"Я веду 32 ребёнка nt":"внутренние размышления + сравнение с альтернативой (Конкурс.ру, Школьный портал, ручной поиск)\r\n- **Goal:** понять - решает задачу или нет\r\n- **Thoughts:**\r\n  - \"В целом - да, удобнее, чем Яндекс + Excel\"\r\n  - \"Но рутины с формами всё равно много\"\r\n- **Emotion:** hopeful (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Если платформа не напоминает о себе - забываю, возвращаюсь в Яндекс\" (гипотеза)\r\n- **Opportunities:**\r\n  - Триггерное письмо в начале нового сезона: \"Пора планировать конкурсы на этот год\"\r\n  - Персональный менеджер для топ-100 педагогов по обороту"}},{"id":"C3.2","title":"Подача второй заявки в новом сезоне","fields":{"Touchpoint":"events.артнавигатор.рф + ЛК my.артнавигатор.рф\r\n- **Goal:** проверить - стала ли платформа лучше за лето\r\n- **Thoughts:**\r\n  - \"Если шаблоны работают - я в деле\"\r\n  - \"Если снова 600 полей - пойду искать альтернативу\"\r\n- **Emotion:** confident (3)\r\n- **Intensity:** 3\r\n- **Pain points:**\r\n  - \"Нет шаблона коллектива для повторных заявок\" (гипотеза)\r\n- **Opportunities:**\r\n  - \"Мой коллектив\" в ЛК - сохраняет список учеников + кнопка \"Создать новую заявку на основе\""}},{"id":"C4.1","title":"Вход в привычку - 3+ сезона","fields":{"Touchpoint":"events.артнавигатор.рф, my.артнавигатор.рф, oki.артнавигатор.рф\r\n- **Goal:** платформа становится рабочим инструментом, а не разовой попыткой\r\n- **Thoughts:**\r\n  - \"Я уже не представляю, как раньше жила без шаблонов и истории заявок\"\r\n- **Emotion:** confident (5)\r\n- **Intensity:** 5\r\n- **Pain points:**\r\n  - \"Нет программы лояльности для постоянных педагогов\" (гипотеза)\r\n- **Opportunities:**\r\n  - Скидки за лояльность: \"Вы с нами 3-й сезон - бесплатный диплом гос. образца на 1 участника\"\r\n  - Бейдж \"Постоянный партнёр\" на странице в classes.артнавигатор.рф"}},{"id":"C4.2","title":"Углубление - новые номинации и форматы","fields":{"Touchpoint":"расширенный каталог на events.артнавигатор.рф\r\n- **Goal:** попробовать новые форматы - онлайн, международные, многожанровые\r\n- **Thoughts:**\r\n  - \"Хочу попробовать международный конкурс, но боюсь языкового барьера\"\r\n- **Emotion:** hopeful (4)\r\n- **Intensity:** 4\r\n- **Pain points:**\r\n  - \"Нет рекомендаций 'вот что ещё интересно'\" (гипотеза)\r\n- **Opportunities:**\r\n  - Подборка \"Смелые варианты\" - конкурсы, которые выходят за рамки обычного"}},{"id":"C5.1","title":"Рекомендации коллегам","fields":{"Touchpoint":"разговоры в учительской + отзыв на сайте\r\n- **Goal:** поделиться опытом\r\n- **Thoughts:**\r\n  - \"Петровна спрашивает - где я подаю заявки - расскажу\"\r\n- **Emotion:** proud (5)\r\n- **Intensity:** 5\r\n- **Pain points:**\r\n  - \"Нет удобного способа пригласить коллегу\" (гипотеза)\r\n- **Opportunities:**\r\n  - Реферальная ссылка \"Пригласите коллегу - получите 1 бесплатную заявку\"\r\n  - Кнопка \"Рассказать коллегам\" после удачного опыта"}},{"id":"C5.2","title":"Участие в жизни платформы","fields":{"Touchpoint":"отзывы, UGC, тематические вебинары ArtNavigator\r\n- **Goal:** быть не просто клиентом, а частью сообщества\r\n- **Thoughts:**\r\n  - \"Я могу быть в жюри или ментором для новых педагогов\"\r\n- **Emotion:** proud (5)\r\n- **Intensity:** 5\r\n- **Pain points:**\r\n  - \"Нет закрытого клуба / сообщества педагогов\" (гипотеза)\r\n- **Opportunities:**\r\n  - \"Клуб педагогов ArtNavigator\" - вебинары, обмен опытом, ранний доступ к продуктам"}}];

function escapeHtml(s) { if(!s)return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseStep(step) {
  const f = step.fields || {};
  const r = { Touchpoint:'', Goal:'', Thoughts:[], Emotion:'', Pain:[], Opportunities:[] };
  const raw = f.Touchpoint || '';
  const parts = raw.split(/(?=\*\*[A-Za-zА-Яа-я]+\*\*)/);
  parts.forEach(p => {
    p = p.trim(); if(!p) return;
    let m;
    if (m = p.match(/^\*\*Touchpoint:\*\*\s*(.+?)(?=\n-\s*\*\*|$)/s)) r.Touchpoint = m[1].trim().split('\n')[0];
    else if (m = p.match(/^\*\*Goal:\*\*\s*(.+?)(?=\n-\s*\*\*|$)/s)) r.Goal = m[1].trim();
    else if (m = p.match(/^\*\*Thoughts:\*\*\s*([\s\S]+?)(?=\n-\s*\*\*|$)/)) {
      r.Thoughts = m[1].split('\n').map(t => t.replace(/^\s*-\s*"?|"?\s*$/g,'').trim()).filter(t => t.length > 0);
    }
    else if (m = p.match(/^\*\*Emotion:\*\*\s*(.+)/)) r.Emotion = m[1].trim();
    else if (m = p.match(/^\*\*Pain points:\*\*\s*([\s\S]+?)(?=\n-\s*\*\*|$)/)) {
      r.Pain = m[1].split('\n').map(t => t.replace(/^\s*-\s*/,'').trim()).filter(t => t.length > 0);
    }
    else if (m = p.match(/^\*\*Opportunities:\*\*\s*([\s\S]+?)$/s)) {
      r.Opportunities = m[1].split('\n').map(t => t.replace(/^\s*-\s*/,'').trim()).filter(t => t.length > 0);
    }
  });
  return r;
}

function openStep(stepId) {
  const step = STEPS_DATA.find(s => s.id === stepId);
  if (!step) return;
  const p = parseStep(step);
  document.getElementById('m-step-num').textContent = step.id + ' · ' + (step.id.startsWith('A') ? 'Один конкурс' : step.id.startsWith('B') ? 'Учебный год' : '1-2 года');
  document.getElementById('m-title').textContent = step.title;
  document.getElementById('m-emotion').innerHTML = p.Emotion ? '<span class="emotion-badge">' + escapeHtml(p.Emotion) + '</span>' : '';
  
  let html = '';
  if (p.Touchpoint) html += '<div class="field"><div class="field-label">Touchpoint · Где происходит</div><div class="field-value">' + escapeHtml(p.Touchpoint) + '</div></div>';
  if (p.Goal) html += '<div class="field"><div class="field-label">Goal · Чего хочет педагог</div><div class="field-value">' + escapeHtml(p.Goal) + '</div></div>';
  if (p.Thoughts.length) html += '<div class="field"><div class="field-label">Мысли педагога</div>' + p.Thoughts.map(t => '<div class="thought-item">' + escapeHtml(t) + '</div>').join('') + '</div>';
  if (p.Pain.length) html += '<div class="field"><div class="field-label">Боли и барьеры</div>' + p.Pain.map(x => '<div class="pain-item">' + escapeHtml(x) + '</div>').join('') + '</div>';
  if (p.Opportunities.length) html += '<div class="field"><div class="field-label">Возможности для АртНавигатор</div>' + p.Opportunities.map(x => '<div class="opp-item">' + escapeHtml(x) + '</div>').join('') + '</div>';
  
  document.getElementById('m-body').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

// Click on any step node
document.querySelectorAll('.step-node').forEach(el => {
  el.addEventListener('click', () => openStep(el.dataset.stepId));
});

// Close on backdrop click
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// Esc to close
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
